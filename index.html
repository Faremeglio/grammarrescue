<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Grammar Rescue · вайрфреймы лендинга</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Caveat:wght@500;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #efece4; font-family: "Archivo", system-ui, sans-serif; color: #141414; }
    * { box-sizing: border-box; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wireframes.jsx"></script>

  <script type="text/babel" data-presets="react">
    function App() {
      return (
        <DesignCanvas
          title="Grammar Rescue — wireframes"
          subtitle="3 структурных направления для лендинга ОГЭ-интенсива. Лоу-фай: ритм, иерархия, повторы CTA. Цвета и финальная типографика — следующий шаг."
        >
          <DCSection
            id="landing-directions"
            title="Направления лендинга"
            subtitle="Каждый вариант — полноценный скролл. Кликни на артборд, чтобы открыть на весь экран и пролистать."
          >
            <DCArtboard
              id="a-calm-split"
              label="A · Calm Split — спокойный edtech"
              width={1200}
              height={5800}
            >
              <window.WireframeA />
            </DCArtboard>

            <DCArtboard
              id="b-carousel-stories"
              label="B · Carousel Stories — Instagram-карусель"
              width={1200}
              height={5800}
            >
              <window.WireframeB />
            </DCArtboard>

            <DCArtboard
              id="c-editorial-urgency"
              label="C · Editorial Urgency — крупная типографика + срочность"
              width={1200}
              height={6500}
            >
              <window.WireframeC />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
